# @package _global_
# FlashSAC
training:
  task_name: Hex4JoystickFlat
  sim_backend: mujoco
algo:
  num_envs: 1024
  learning_starts: 50
  max_iterations: 12000
  save_interval: 1000
  updates_per_step: 2
  batch_size: 2048
  replay_buffer_n: 4096
  tau: 0.05
env:
  control_config:
    action_scale: 0.25 # 0.4 for go2
  domain_rand:
    randomize_kp: false
    randomize_kd: false
    randomize_base_mass: false
    random_com: false
    randomize_gravity: false
    push_robots: true
  noise_config:
    level: 1.0
    scale_joint_angle: 0.01
    scale_joint_vel: 0.1
    scale_gyro: 0.0
    scale_gravity: 0.0
    scale_linvel: 0.0
reward:
  scales:
    tracking_lin_vel: 4
    tracking_ang_vel: 2
    lin_vel_z: -5.0
    ang_vel_xy: -0.1
    base_height: -10.0
    action_rate: -0.05
    similar_to_default: -0.
    contact: 3
    swing_feet_z: 7.0
    orientation: -15
    dof_acc: -4.e-7

  tracking_sigma: 0.4
  base_height_target: 0.4