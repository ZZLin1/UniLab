# @package _global_
# PPO
training:
  task_name: NewhexRFTouch
  sim_backend: mujoco

play_profile:
  enabled: true

algo:
  num_envs: 1024
  max_iterations: 501
  empirical_normalization: true
  obs_groups:
    actor:
      - actor
    critic:
      - critic
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 1.0e-3

env:
  target_sampling:
    low: [0.2, -0.2, 0.0]
    high: [0.8, 0.6, 1.2]
    success_distance: 0.05
  load:
    body_name: RF_foot_link
    force_range: [0.0, 50.0]

reward:
  scales:
    base_lin_vel_zero: 2.0
    base_ang_vel_zero: 1.0
    support_feet_still: 2.0
    support_feet_vel: 1.0
    support_feet_contact: 2.0
    rf_target: 8.0
    action_rate: -0.05
    torques: -2.0e-4
    dof_vel: -1.0e-3
    dof_acc: -4.0e-7
    energy: -1.0e-5
  tracking_sigma: 0.25
  target_sigma: 0.1
  support_still_sigma: 0.02
  support_vel_sigma: 0.05
  contact_threshold: 0.1
