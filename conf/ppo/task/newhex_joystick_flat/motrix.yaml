# @package _global_
# PPO
training:
  task_name: NewhexJoystickFlat
  sim_backend: motrix


algo:
  num_envs: 1024
  max_iterations: 501
  empirical_normalization: true
  obs_groups:
    actor:
      - actor
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 1.0e-3
    
reward:
  scales:
    tracking_lin_vel: 4
    tracking_ang_vel: 2
    lin_vel_z: -5.0
    ang_vel_xy: -0.1
    base_height: -10.0
    action_rate: -0.05
    similar_to_default: -0.
    contact: 3
    swing_feet_z: 7.0
    orientation: -15
    dof_acc: -4.e-7

  tracking_sigma: 0.4
  base_height_target: 0.4