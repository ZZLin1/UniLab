# @package _global_
# PPO
training:
  task_name: NewhexJoystickFlat
  sim_backend: motrix

play_profile:
  enabled: true
  env:
    commands:
      fixed_command: [1.5, 0.0, 0.0]

algo:
  num_envs: 1024
  max_iterations: 1001
  empirical_normalization: true
  obs_groups:
    actor:
      - actor
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 1.0e-3

reward:
  scales:
    tracking_lin_vel: 4
    tracking_ang_vel: 2
    lin_vel_z: -5.0
    ang_vel_xy: -0.1
    base_height: 0 #-10.0
    action_rate: -0.05
    torques: 0   #-2.0e-4
    dof_vel: -1.0e-3
    energy: -1.0e-5
    similar_to_default: -0.
    contact: 3
    contact_forces: -1.0e-3
    feet_slide: -0.1
    swing_feet_z: 7.0
    orientation: -15
    dof_acc: -4.e-7

  tracking_sigma: 0.4
  base_height_target: 0.45
  contact_forces_threshold: 200.0
